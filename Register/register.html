<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>El Pollón – Registro</title>
  <link rel="stylesheet" href="register.css" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar">
    <a class="logo" href="index.html">🍗 El Pollón</a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-icon">✍️</span>
        <h2>Crea tu cuenta</h2>
        <p>Únete y disfruta de ofertas exclusivas para miembros</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Juan" />
        </div>
        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Pérez" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tucorreo@ejemplo.com" />
      </div>

      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="+51 999 999 999" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
      </div>

      <div class="form-group">
        <label for="confirm">Confirmar contraseña</label>
        <input type="password" id="confirm" placeholder="Repite tu contraseña" />
      </div>

      <button class="btn-submit" onclick="alert('¡Cuenta creada! Bienvenido 🍗')">Crear Cuenta</button>

      <p class="auth-footer">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
      </p>
    </div>
  </div>

</body>
</html>
