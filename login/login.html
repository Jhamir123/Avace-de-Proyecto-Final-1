<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>El Pollón – Iniciar Sesión</title>
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="navbar">
    <a class="logo" href="../home/index.html">🍗 El Pollón</a>
    <ul class="nav-links">
      <li><a href="../home/index.html">Inicio</a></li>
      <li><a href="../carta/carta.html">Carta</a></li>
      <li><a href="login.html" class="active">Iniciar Sesión ECONÓMICO</a></li>
      <li><a href="../register/register.html" class="btn-nav">Registrarse</a></li>
    </ul>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <span class="auth-icon">🔑</span>
        <h2>Bienvenido de vuelta</h2>
        <p>Ingresa tus datos para acceder a tu cuenta</p>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="tucorreo@ejemplo.com" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" />
        <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>
      </div>

      <button class="btn-submit" onclick="alert('¡Sesión iniciada! 🍗')">Iniciar Sesión</button>

      <p class="auth-footer">
        ¿No tienes cuenta? <a href="../register/register.html">Regístrate aquí</a>
      </p>
    </div>
  </div>

</body>
</html>
